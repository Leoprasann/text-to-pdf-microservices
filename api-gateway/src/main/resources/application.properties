spring.application.name=api-gateway
server.port=8080

eureka.client.service-url.defaultZone=http://localhost:8761/eureka

spring.cloud.gateway.server.webflux.routes[0].id=document-service
spring.cloud.gateway.server.webflux.routes[0].uri=lb://DOCUMENT-SERVICE
spring.cloud.gateway.server.webflux.routes[0].predicates[0]=Path=/documents/**